<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Geocodificador — Magé</title>
<style>
  body { font-family: monospace; padding: 20px; background: #111; color: #eee; }
  h2 { color: #fff; }
  .ok   { color: #4caf50; }
  .fail { color: #f44336; }
  .info { color: #ffeb3b; }
  #log  { margin-top: 16px; font-size: 13px; line-height: 1.8; }
  #resultBox { margin-top: 20px; background: #1a1a1a; border: 1px solid #444; padding: 16px; border-radius: 6px; display:none; }
  pre  { white-space: pre-wrap; word-break: break-all; font-size: 12px; }
  button { background: #1565C0; color: #fff; border: none; padding: 10px 24px; font-size: 15px; border-radius: 5px; cursor: pointer; margin: 4px; }
  #btnCopy { background: #2e7d32; }
</style>
</head>
<body>
<h2>🗺️ Geocodificador de Magé</h2>
<button onclick="runGeocode()">▶ Iniciar</button>
<div id="log"></div>
<div id="resultBox">
  <b style="color:#fff">Cole isso no chat:</b>
  <pre id="output"></pre>
  <button id="btnCopy" onclick="copyResult()">📋 Copiar</button>
</div>

<script>
const KEY = 'AIzaSyAc09-nPxI8mUBGmjGg7MX_9MQsK606q2w';
const log = document.getElementById('log');
const addLog = (cls, msg) => { log.innerHTML += `<div class="${cls}">${msg}</div>`; };

const ADDR = {
  'd_mage':         'R. dos Expedicionários, 39, Centro, Magé, RJ, Brasil',
  'd_guapi':        'Vila Guapi, Guapimirim, RJ, Brasil',
  'd_surui':        'Suruí, Magé, RJ, Brasil',
  'd_inhomirim':    'Parque Sao Jorge, Magé, RJ, 25931-638, Brasil',
  'd_guia':         'São Lourenço, Magé, RJ, 25926-571, Brasil',
  'b_bongaba':      'Estrada Mineira, 136, Magé, RJ, Brasil',
  'b_goya':         'Estrada da Cidade Naval, 183, Magé, RJ, Brasil',
  'b_garapa':       'Rua Waldemar Lima Teixeira, 253, Magé, RJ, Brasil',
  'b_magemirim':    'Avenida Simão da Motta, 363, Magé, RJ, Brasil',
  'b_vilainca':     'Rua das Jaqueiras, 232, Magé, RJ, 25907-530, Brasil',
  'b_iriri':        'Iriri, Magé, RJ, Brasil',
  'b_quitungo':     'Rua Marquês de Olinda, 162, Magé, RJ, 25903-640, Brasil',
  'b_jambalaia':    'Rua Jambalaya, 57, Magé, RJ, Brasil',
  'b_taquaral':     'Rua Quarenta e Oito, 159, Magé, RJ, Brasil',
  'b_gande':        'Gandé, Magé, RJ, Brasil',
  'b_ipiranga':     'Rua Maestro Pedro Calil, 225, Magé, RJ, 25926-894, Brasil',
  'b_saofrancisco': 'São Francisco do Cruará, Magé, RJ, 25925-415, Brasil',
  'b_piabeta':      'Piabetá, Magé, RJ, 25931-894, Brasil',
  'b_parquehumaita':'Parque Humaitá, Magé, RJ, Brasil',
  'b_parquecacula': 'Parque Caçula, Magé, RJ, 25936-695, Brasil',
  'q_mariaconga':   'Rua Amazonas, 155, Maria Conga, Magé, RJ, 25901-246, Brasil',
  'q_bongaba':      'Bongaba, Magé, RJ, Brasil',
  'q_feital':       'Estrada do Feital, Magé, RJ, Brasil',
  'n_monjolo':      'Santo Aleixo, Magé, RJ, 25912-021, Brasil',
  'n_castelos':     'Guapimirim, RJ, 25940-000, Brasil',
  'n_rioinhomirim': 'Sobradinho, Magé, RJ, 25932-525, Brasil',
  'n_riosurui':     'Avenida Beira Mar, 995, Magé, RJ, 25900-970, Brasil',
  'n_praiamaua':    'Avenida Beira Mar, 479, Magé, RJ, 25926-690, Brasil',
};
const DIRECT = {
  'n_riomage':    [-22.686111, -43.048861],
  'n_pontagoiana':[-22.695500, -43.116056],
};

async function geocode(id, addr) {
  const url = `https://maps.googleapis.com/maps/api/geocode/json?address=${encodeURIComponent(addr)}&key=${KEY}&region=br&language=pt-BR`;
  try {
    const res = await fetch(url);
    addLog('info', `${id}: HTTP ${res.status}`);
    const data = await res.json();
    addLog('info', `${id}: status=${data.status}`);
    if (data.status === 'OK') {
      const l = data.results[0].geometry.location;
      return [parseFloat(l.lat.toFixed(6)), parseFloat(l.lng.toFixed(6))];
    } else {
      addLog('fail', `${id}: ERRO Google → ${data.status} | ${data.error_message || ''}`);
      return null;
    }
  } catch(e) {
    addLog('fail', `${id}: EXCEÇÃO → ${e.message}`);
    return null;
  }
}

async function runGeocode() {
  log.innerHTML = '';
  const results = {...DIRECT};
  const ids = Object.keys(ADDR);
  for (const id of ids) {
    addLog('info', `Geocodificando: ${id}…`);
    const coords = await geocode(id, ADDR[id]);
    if (coords) {
      results[id] = coords;
      addLog('ok', `✅ ${id}: ${coords}`);
    }
    await new Promise(r => setTimeout(r, 200));
  }
  const json = JSON.stringify(results, null, 2);
  document.getElementById('output').textContent = json;
  document.getElementById('resultBox').style.display = 'block';
  addLog('ok', `\nConcluído: ${Object.keys(results).length}/30`);
}

function copyResult() {
  navigator.clipboard.writeText(document.getElementById('output').textContent)
    .then(() => { document.getElementById('btnCopy').textContent = '✅ Copiado!'; });
}
</script>
</body>
</html>
